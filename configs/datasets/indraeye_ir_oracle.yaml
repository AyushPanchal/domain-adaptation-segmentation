# YOLO dataset config template for IR oracle training/evaluation.

name: indraeye_ir_oracle
task: segment

paths:
  data_root: ${DATA_ROOT:data/processed}
  train_images: ${DATA_ROOT:data/processed}/ir_train/images
  val_images: ${DATA_ROOT:data/processed}/ir_val/images
  test_images: ${DATA_ROOT:data/processed}/ir_test/images

labels:
  train: ${DATA_ROOT:data/processed}/ir_train/labels
  val: ${DATA_ROOT:data/processed}/ir_val/labels
  test: ${DATA_ROOT:data/processed}/ir_test/labels

nc: 12
names:
  0: Bicycle
  1: Bus
  2: Car
  3: Cargo trike
  4: Ignore
  5: Motorcycle
  6: Person
  7: Rickshaw
  8: Small truck
  9: Tractor
  10: Truck
  11: Van
